apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-retail-config
data:
  APP_ENV: "prod"
  DEBUG: "0"
  API_PREFIX: "/api/v1"
  REDIS_URL: "redis://redis:6379/0"
  LLM_PROVIDER: "mock"
  LLM_MODEL: "gpt-4o-mini"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-retail-secrets
type: Opaque
stringData:
  POSTGRES_DSN: "postgresql+asyncpg://app:app@postgres:5432/retail_ai"
  LLM_API_BASE: ""
  LLM_API_KEY: ""

