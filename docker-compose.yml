services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: dev
      DEBUG: "1"
      POSTGRES_DSN: postgresql+asyncpg://app:app@postgres:5432/retail_ai
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: mock
      LLM_API_BASE: ""
      LLM_API_KEY: ""
      LLM_MODEL: gpt-4o-mini
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retail_ai
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

