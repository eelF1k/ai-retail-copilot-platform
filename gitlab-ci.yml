stages:
  - test
  - build

default:
  image: python:3.13-slim
  before_script:
    - pip install --no-cache-dir -r requirements.txt

backend_tests:
  stage: test
  script:
    - python -m pytest -q
    - python -m compileall backend/app tests scripts

docker_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -f backend/Dockerfile -t ai-retail-copilot:ci .

